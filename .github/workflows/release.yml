name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Stage 1: create the draft release exactly once ───────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft release via GitHub API
        id: create
        run: |
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "$(jq -n \
              --arg tag "${{ github.ref_name }}" \
              --arg name "OpenPaste ${{ github.ref_name }}" \
              --arg body "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." \
              '{tag_name:$tag,name:$name,body:$body,draft:true,prerelease:false}')" \
            | jq -r '.id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "Created release ID: $RELEASE_ID"

  # ── Stage 2: build each platform and upload to the same release ──────────
  build:
    name: Build — ${{ matrix.label }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-arm64
            target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            daemon_ext: ''

          - os: macos-latest
            label: macOS-x64
            target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
            daemon_ext: ''

          - os: windows-latest
            label: Windows-x64
            target: x86_64-pc-windows-msvc
            tauri_args: ''
            daemon_ext: '.exe'

          - os: ubuntu-22.04
            label: Linux-x64
            target: x86_64-unknown-linux-gnu
            tauri_args: ''
            daemon_ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      # Build the daemon first — it must exist before tauri-action bundles it
      - name: Build daemon
        run: cargo build --bin openpaste-daemon --release --target ${{ matrix.target }}

      # Copy daemon into src-tauri/binaries/ with the triple-suffixed name
      # that Tauri's externalBin expects: openpaste-daemon-<triple>[.exe]
      - name: Stage daemon binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/${{ matrix.target }}/release/openpaste-daemon \
             apps/desktop/src-tauri/binaries/openpaste-daemon-${{ matrix.target }}

      - name: Stage daemon binary (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path apps/desktop/src-tauri/binaries
          Copy-Item "target/${{ matrix.target }}/release/openpaste-daemon.exe" `
            "apps/desktop/src-tauri/binaries/openpaste-daemon-${{ matrix.target }}.exe"

      - name: Build Tauri app and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.tauri_args }}
